<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title> AG-TIME </title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet"> 

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/lightbox/css/lightbox.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script  source="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" >
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="./bootstrap/bootstrap-5.1.3-dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Template Stylesheet -->
   
    <link rel="icon" type="image/png" sizes="60x60" href="img/Logo contemporain AG-Time sur fond blanc.png">

<style>
body {
    background-color: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar {
    background-color: #4f7f6a;
    height: 100vh;
    color: white;
}

.sidebar h4 {
    font-weight: bold;
}

.sidebar a {
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    display: block;
}

.sidebar a.active,
.sidebar a:hover {
    background-color: rgba(255,255,255,0.15);
    border-radius: 6px;
}

/* Cards statistiques */
.stat-card {
    border-radius: 12px;
    color: white;
    padding: 20px;
}

.bg-blue { background: linear-gradient(135deg, #4e73df, #224abe); }
.bg-green { background: linear-gradient(135deg, #1cc88a, #13855c); }
.bg-orange { background: linear-gradient(135deg, #f6c23e, #dda20a); }
.bg-red { background: linear-gradient(135deg, #e74a3b, #be2617); }

.stat-card i {
    font-size: 2.5rem;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar p-3">
    <h4 class="text-center mb-4">RH / Admin</h4>
    <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="#"><i class="bi bi-file-text"></i> Demandes</a>
    <a href="#"><i class="bi bi-people"></i> Utilisateurs</a>
    <a href="#" class="active"><i class="bi bi-bar-chart"></i> Statistiques</a>
    <a href="#"><i class="bi bi-box-arrow-right"></i> Déconnexion</a>
</div>

<!-- CONTENU -->
<div class="col-md-10 p-4">

<h3 class="mb-4">
    <i class="bi bi-bar-chart-fill"></i> Statistiques des congés
</h3>

<!-- CARTES -->
<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="stat-card bg-blue shadow-sm">
            <h6>Total employés</h6>
            <h2>25</h2>
            <i class="bi bi-people"></i>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-card bg-green shadow-sm">
            <h6>Congés validés</h6>
            <h2>18</h2>
            <i class="bi bi-check-circle"></i>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-card bg-orange shadow-sm">
            <h6>En attente</h6>
            <h2>5</h2>
            <i class="bi bi-hourglass-split"></i>
        </div>
    </div>

    <div class="col-md-3">
        <div class="stat-card bg-red shadow-sm">
            <h6>Refusés</h6>
            <h2>2</h2>
            <i class="bi bi-x-circle"></i>
        </div>
    </div>
</div>

<!-- GRAPHIQUES -->
<div class="row">

    <!-- Congés par mois -->
    <div class="col-md-6">
        <div class="card shadow-sm p-3 mb-4">
            <h6 class="text-center">Congés par mois</h6>
            <canvas id="congesMois"></canvas>
        </div>
    </div>

    <!-- Répartition -->
    <div class="col-md-6">
        <div class="card shadow-sm p-3 mb-4">
            <h6 class="text-center">Répartition des demandes</h6>
            <canvas id="repartition"></canvas>
        </div>
    </div>

</div>

</div>
</div>
</div>

<!-- JS -->
<script>
// Graphique barres
new Chart(document.getElementById('congesMois'), {
    type: 'bar',
    data: {
        labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin'],
        datasets: [{
            label: 'Congés',
            data: [3, 4, 3, 5, 4, 5],
            backgroundColor: '#4e73df'
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        responsive: true
    }
});

// Graphique donut
new Chart(document.getElementById('repartition'), {
    type: 'doughnut',
    data: {
        labels: ['Validés', 'En attente', 'Refusés'],
        datasets: [{
            data: [18, 5, 2],
            backgroundColor: ['#1cc88a', '#f6c23e', '#e74a3b']
        }]
    }
});
</script>

</body>
</html>
