<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Utilisateur</title>
    <link rel="stylesheet" href="/bootstrap/bootstrap-5.1.3-dist/css/bootstrap.css">
</head>
<body>
    <div class="col-md-10 p-4">

<h3 class="mb-4">
    <i class="bi bi-person-plus-fill"></i> Ajout d'utilisateur
</h3>

<div class="card shadow-sm p-4">
<form action="ajouter_compte.php" method="post">

<div class="row mb-3">
    <div class="col-md-6">
        <label class="form-label" for="name">Nom</label>
        <input type="text" name="nom" class="form-control" placeholder="nom" required>
    </div>
    <div class="col-md-6">
        <label class="form-label" for="name">prenom</label>
        <input type="text" name="prenom" class="form-control" placeholder="prenom" required>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <label class="form-label" for="tel">telephone</label>
        <input type="tel" name="tel" class="form-control" placeholder="" required>
    </div>

    <div class="col-md-6">
        <label class="form-label" for="email">email</label>
        <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
    </div>
    
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="mdp" class="form-control" id="password" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Rôle</label>
        <select class="form-select" name="ft" required>
            <option value="roles"></option>
            <option>EMPLOYE</option>
            <option>RH</option>
            <option>ADMIN</option>
        </select>
    </div>
    
</div>

<div class="col-12">
   <button class="btn btn-outline-primary my-2 col-4" type="submit" name="ajt"> Ajouter </button>
</div>
</form>
</div>

</body>
</html>
