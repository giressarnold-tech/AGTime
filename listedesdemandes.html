<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>JOUR OFF</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet"> 

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/lightbox/css/lightbox.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script  source="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" >
    </script>

    <!-- Bootstrap -->
    <link href="./bootstrap/bootstrap-5.1.3-dist/css/bootstrap.min.css" rel="stylesheet">



    <!-- Template Stylesheet -->
    <link href="css/listesdemandes.css" rel="stylesheet">
    
    
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar p-3">
    <h4 class="text-center mb-4">RH / Admin</h4>
    <a href="#">Dashboard</a>
    <a href="#" class="active">Demandes</a>
    <a href="#">Utilisateurs</a>
    <a href="#">Statistiques</a>
    <a href="#">Déconnexion</a>
</div>

<!-- CONTENU -->
<div class="col-md-10 p-4">

<h3 class="mb-4">
    <i class="bi bi-file-text"></i> Liste des demandes
</h3>

<div class="card shadow-sm">
<div class="table-responsive">
<table class="table table-hover align-middle mb-0">
<thead class="table-light">
<tr>
    <th>Employé</th>
    <th>Type</th>
    <th>Période</th>
    <th>Motif</th>
    <th>Statut</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="demandeTable">
<tr>
    <td>Jean Mbala</td>
    <td>Congé annuel</td>
    <td>12/05/2025 - 15/05/2025</td>
    <td>Repos annuel</td>
    <td><span class="badge badge-pending">En attente</span></td>
    <td>
        <button class="btn btn-info btn-sm" onclick="voirDemande(this)">
            <i class="bi bi-eye"></i>
        </button>
        <button class="btn btn-success btn-sm" onclick="valider(this)">
            <i class="bi bi-check-circle"></i>
        </button>
        <button class="btn btn-danger btn-sm" onclick="refuser(this)">
            <i class="bi bi-x-circle"></i>
        </button>
    </td>
</tr>
</tbody>
</table>
</div>
</div>

</div>
</div>
</div>

<!-- MODAL MOTIF REFUS -->
<div class="modal fade" id="refusModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">Motif du refus</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
        <textarea id="motifRefus" class="form-control" placeholder="Entrez le motif du refus"></textarea>
    </div>
    <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-danger" onclick="confirmerRefus()">Confirmer</button>
    </div>
</div>
</div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let demandeEnCours = null;

function voirDemande(btn) {
    const row = btn.closest("tr");
    alert(
        "Détails de la demande :\n\n" +
        "Employé : " + row.cells[0].innerText + "\n" +
        "Type : " + row.cells[1].innerText + "\n" +
        "Période : " + row.cells[2].innerText + "\n" +
        "Motif : " + row.cells[3].innerText
    );
}

function valider(btn) {
    const row = btn.closest("tr");
    const badge = row.querySelector(".badge");
    badge.className = "badge badge-approved";
    badge.innerText = "Validée";
}

function refuser(btn) {
    demandeEnCours = btn.closest("tr");
    new bootstrap.Modal(document.getElementById("refusModal")).show();
}

function confirmerRefus() {
    const badge = demandeEnCours.querySelector(".badge");
    badge.className = "badge badge-refused";
    badge.innerText = "Refusée";
    document.getElementById("motifRefus").value = "";
    bootstrap.Modal.getInstance(document.getElementById("refusModal")).hide();
}
</script>

</body>
</html>
